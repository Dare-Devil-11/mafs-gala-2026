<div id="mafs2026gala"></div>
<script>
(function(){
'use strict';
var CFG={
  title:'2026 MAFS Gala',
  subtitle:'Annual Gala & Fundraiser',
  date:'Saturday, December 12, 2026 • 6:00 PM',
  venue:'1 E Bode Rd, Streamwood, IL 60107',
  appsScriptUrl:'https://script.google.com/macros/s/AKfycbyACQZf1eV47ibEB309TftUz6WauUJsYflITKzUla1KCBEjO9lcO4KGNK9KbcdkJBP2zw/exec',
  paymentLinks:{VVIP:'PASTE_VVIP_PAYMENT_LINK_HERE',VIP:'PASTE_VIP_PAYMENT_LINK_HERE',GOLD:'PASTE_GOLD_PAYMENT_LINK_HERE',GENERAL:'PASTE_GENERAL_PAYMENT_LINK_HERE'},
  prices:{VVIP:500,VIP:250,GOLD:150,GENERAL:100},
  capacity:{GOLD:200,GENERAL:200}
};

var ARCS=[
  {t:'VVIP',n:15,r:130,a0:215,a1:325},
  {t:'VVIP',n:17,r:155,a0:212,a1:328},
  {t:'VVIP',n:18,r:180,a0:209,a1:331},
  {t:'VIP', n:22,r:208,a0:207,a1:333},
  {t:'VIP', n:24,r:235,a0:205,a1:335},
  {t:'VIP', n:26,r:262,a0:203,a1:337},
  {t:'VIP', n:28,r:289,a0:201,a1:339}
];
var CX=400,CY=500,NS='http://www.w3.org/2000/svg';

function r2(d){return d*Math.PI/180;}
function px(r,a){return CX+r*Math.cos(r2(a));}
function py(r,a){return CY+r*Math.sin(r2(a));}
function f(v){return v.toFixed(1);}

function bandPath(ri,ro,a0,a1){
  return 'M'+f(px(ro,a0))+','+f(py(ro,a0))+
    ' A'+ro+','+ro+' 0 0,1 '+f(px(ro,a1))+','+f(py(ro,a1))+
    ' L'+f(px(ri,a1))+','+f(py(ri,a1))+
    ' A'+ri+','+ri+' 0 0,0 '+f(px(ri,a0))+','+f(py(ri,a0))+' Z';
}

function svgEl(tag,attrs){
  var el=document.createElementNS(NS,tag);
  for(var k in attrs) el.setAttribute(k,attrs[k]);
  return el;
}

var vi=0,pi=0;
var ALL_ARCS=ARCS.map(function(arc){
  var ids=[];
  for(var i=0;i<arc.n;i++){
    if(arc.t==='VVIP') ids.push('VVIP-'+(++vi<10?'0':'')+vi);
    else ids.push('VIP-'+(++pi<10?'00':pi<100?'0':'')+pi);
  }
  return {arc:arc,ids:ids};
});

var ST={sel:new Set(),inv:{},gQty:0,nQty:0};
var seatCircles={};

function seatColor(id,tier){
  if(ST.sel.has(id)) return '#22c55e';
  var s=ST.inv[id]||'available';
  if(s==='sold') return '#1e2333';
  if(s==='locked') return '#4b5563';
  return tier==='VVIP'?'#8b5cf6':'#ec4899';
}

function buildSVG(){
  var svg=svgEl('svg',{viewBox:'-10 0 820 510',width:'100%',style:'display:block;max-height:430px'});

  svg.appendChild(svgEl('path',{d:bandPath(302,338,199,341),fill:'#f5b82e',opacity:'.15','pointer-events':'none'}));
  svg.appendChild(svgEl('path',{d:bandPath(344,378,197,343),fill:'#94a3b8',opacity:'.12','pointer-events':'none'}));

  var gl=svgEl('text',{x:'400',y:'318',fill:'#a38520','font-size':'10','font-weight':'700','text-anchor':'middle','pointer-events':'none','letter-spacing':'1'});
  gl.textContent='GOLD OPEN SEATING';
  svg.appendChild(gl);
  var nl=svgEl('text',{x:'400',y:'276',fill:'#6b7280','font-size':'10','font-weight':'700','text-anchor':'middle','pointer-events':'none','letter-spacing':'1'});
  nl.textContent='GENERAL ADMISSION';
  svg.appendChild(nl);

  seatCircles={};
  ALL_ARCS.forEach(function(entry){
    var arc=entry.arc,ids=entry.ids;
    ids.forEach(function(id,i){
      var ratio=arc.n>1?i/(arc.n-1):0.5;
      var a=arc.a0+(arc.a1-arc.a0)*ratio;
      var x=px(arc.r,a),y=py(arc.r,a);
      var rad=arc.t==='VVIP'?6:4.5;
      var c=svgEl('circle',{cx:f(x),cy:f(y),r:rad,fill:seatColor(id,arc.t),'data-id':id,'data-tier':arc.t,style:'cursor:pointer;transition:fill .12s'});
      var s=ST.inv[id]||'available';
      if(s==='available'){
        (function(cid,circle,t){
          circle.onclick=function(){toggleSeat(cid);};
          circle.onmouseenter=function(){if(!ST.sel.has(cid)) circle.setAttribute('fill','#34d399');};
          circle.onmouseleave=function(){circle.setAttribute('fill',seatColor(cid,t));};
        })(id,c,arc.t);
      }
      svg.appendChild(c);
      seatCircles[id]=c;
    });
  });

  svg.appendChild(svgEl('rect',{x:'300',y:'487',width:'200',height:'17',rx:'5',fill:'#0f172a'}));
  var st=svgEl('text',{x:'400',y:'500',fill:'#93c5fd','font-size':'10','font-weight':'900','text-anchor':'middle','letter-spacing':'3','pointer-events':'none'});
  st.textContent='S T A G E';
  svg.appendChild(st);

  return svg;
}

function updateColors(){
  for(var id in seatCircles){
    var c=seatCircles[id];
    c.setAttribute('fill',seatColor(id,c.getAttribute('data-tier')));
  }
}

function toggleSeat(id){
  if(ST.sel.has(id)) ST.sel.delete(id); else ST.sel.add(id);
  updateColors();
  updateCart();
}

function calcTotal(){
  var t=0;
  ST.sel.forEach(function(id){t+=id.indexOf('VVIP')===0?CFG.prices.VVIP:CFG.prices.VIP;});
  return t+ST.gQty*CFG.prices.GOLD+ST.nQty*CFG.prices.GENERAL;
}

function fmt(n){return n.toLocaleString();}

function updateCart(){
  var total=calcTotal();
  var count=ST.sel.size+ST.gQty+ST.nQty;
  document.getElementById('mg-cart-count').textContent=count;
  document.getElementById('mg-cart-total').textContent=fmt(total);
  document.getElementById('mg-total').textContent=fmt(total);
  document.getElementById('mg-gqty').textContent=ST.gQty;
  document.getElementById('mg-nqty').textContent=ST.nQty;
  var lines=[];
  var vv=Array.from(ST.sel).filter(function(s){return s.indexOf('VVIP')===0;});
  var vp=Array.from(ST.sel).filter(function(s){return s.indexOf('VIP')===0;});
  if(vv.length) lines.push('<div class="cl"><span>VVIP &times;'+vv.length+' &times; $'+fmt(CFG.prices.VVIP)+'</span><b>$'+fmt(vv.length*CFG.prices.VVIP)+'</b></div><div class="cl-ids">'+vv.join(', ')+'</div>');
  if(vp.length) lines.push('<div class="cl"><span>VIP &times;'+vp.length+' &times; $'+fmt(CFG.prices.VIP)+'</span><b>$'+fmt(vp.length*CFG.prices.VIP)+'</b></div><div class="cl-ids">'+vp.join(', ')+'</div>');
  if(ST.gQty) lines.push('<div class="cl"><span>Gold Open &times;'+ST.gQty+' &times; $'+CFG.prices.GOLD+'</span><b>$'+fmt(ST.gQty*CFG.prices.GOLD)+'</b></div>');
  if(ST.nQty) lines.push('<div class="cl"><span>General &times;'+ST.nQty+' &times; $'+CFG.prices.GENERAL+'</span><b>$'+fmt(ST.nQty*CFG.prices.GENERAL)+'</b></div>');
  document.getElementById('mg-cart-lines').innerHTML=lines.length?lines.join(''):'<p style="color:#64748b;text-align:center;margin:16px 0">Cart empty</p>';
}

function showNotice(msg,type){
  var el=document.getElementById('mg-notice');
  el.textContent=msg;
  el.style.display='block';
  var map={error:['#fef2f2','#fca5a5','#991b1b'],warn:['#fffbeb','#fcd34d','#92400e'],info:['#eff6ff','#93c5fd','#1e40af']};
  var c=map[type]||map.info;
  el.style.background=c[0];el.style.borderColor=c[1];el.style.color=c[2];
  setTimeout(function(){el.style.display='none';},5000);
}

async function checkout(){
  var name=document.getElementById('mg-name').value.trim();
  var email=document.getElementById('mg-email').value.trim();
  var phone=document.getElementById('mg-phone').value.trim();
  var total=calcTotal();
  if(!name||!email||!phone){showNotice('Enter name, email, and phone.','warn');return;}
  if(total<=0){showNotice('Select at least one ticket.','warn');return;}
  var btn=document.getElementById('mg-checkout');
  btn.disabled=true;btn.textContent='Processing...';
  var orderId='MAFS-'+Date.now();
  if(!CFG.appsScriptUrl.includes('PASTE_')){
    try{
      var res=await fetch(CFG.appsScriptUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'reserve',name:name,email:email,phone:phone,seatIds:Array.from(ST.sel),goldQty:ST.gQty,generalQty:ST.nQty,total:total})});
      var d=await res.json();
      if(!d.ok){showNotice(d.error+(d.unavailable?'\n'+d.unavailable.join(', '):''),'error');btn.disabled=false;btn.textContent='Checkout →';loadInventory();return;}
      orderId=d.orderId;
    }catch(e){console.warn(e);}
  }
  var vv=Array.from(ST.sel).filter(function(s){return s.indexOf('VVIP')===0;});
  var vp=Array.from(ST.sel).filter(function(s){return s.indexOf('VIP')===0;});
  var link=vv.length?CFG.paymentLinks.VVIP:vp.length?CFG.paymentLinks.VIP:ST.gQty?CFG.paymentLinks.GOLD:CFG.paymentLinks.GENERAL;
  if(link.includes('PASTE_')) showNotice('Order '+orderId+' logged. Paste your payment links to go live.','info');
  else window.location.href=link+(link.includes('?')?'&':'?')+'order_id='+encodeURIComponent(orderId);
  btn.disabled=false;btn.textContent='Checkout →';
}

async function loadInventory(){
  if(CFG.appsScriptUrl.includes('PASTE_')) return;
  try{
    var res=await fetch(CFG.appsScriptUrl+'?action=inventory');
    var d=await res.json();
    if(d.ok) d.seats.forEach(function(s){ST.inv[s.seatId]=s.status;});
  }catch(e){console.warn('Inventory load failed',e);}
  updateColors();
}
